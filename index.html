<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D魔塔</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel-bg: rgba(10,10,20,0.92);
    --text: #cdd6f4;
    --accent: #f5c842;
    --danger: #f38ba8;
    --blue: #89b4fa;
    --green: #a6e3a1;
    --border: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    overflow: hidden;
    font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
    color: var(--text);
    user-select: none;
    -webkit-user-select: none;
    height: 100vh;
    width: 100vw;
  }
  canvas { display:block; }
  #hud {
    position: fixed; top: 0; left: 0;
    height: 100vh;
    width: 175px;
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    padding: 14px 14px;
    backdrop-filter: blur(12px);
    z-index: 10;
    pointer-events: none;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  #hud .floor { font-size: 14px; color: var(--accent); margin-bottom: 8px; font-weight:600; }
  #hud .stat { display:flex; justify-content:space-between; padding:3px 0; font-size:13px; }
  #hud .stat .label { color: var(--text); }
  #hud .stat .val { font-weight:600; }
  #hud .hp .val { color: var(--danger); }
  #hud .atk .val { color: #fab387; }
  #hud .def .val { color: var(--blue); }
  #hud .gold .val { color: var(--accent); }
  #hud .keys { margin-top: 6px; padding-top: 8px; border-top: 1px solid var(--border); display:flex; gap:12px; font-size:12px; }
  #hud .key { display:flex; align-items:center; gap:4px; }
  .key-dot { width:10px; height:10px; border-radius:50%; }
  .key-dot.yellow { background:#f5c842; box-shadow:0 0 6px #f5c842; }
  .key-dot.blue { background:#89b4fa; box-shadow:0 0 6px #89b4fa; }
  .key-dot.red { background:#f38ba8; box-shadow:0 0 6px #f38ba8; }

  #hud .hud-section { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); flex-shrink:0; }
  #hud .hud-section.history { flex:1; overflow:hidden; display:flex; flex-direction:column; min-height:0; }
  #hud .section-title { font-size:10px; color:#9399b2; margin-bottom:4px; font-weight:600; letter-spacing:0.5px; }
  #hud .inventory-grid { display:flex; flex-wrap:wrap; gap:3px; min-height:18px; }
  #hud .inv-item { font-size:14px; line-height:1; opacity:0.9; }
  #hud .history-list { flex:1; overflow-y:auto; min-height:0; }
  #hud .history-entry { font-size:10px; color:#9399b2; padding:1px 0; word-break:break-all; line-height:1.3; }
  #hud .history-entry:first-child { color:#cdd6f4; }

  #minimap {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
    z-index: 10;
  }
  #minimap canvas { display:block; border-radius: 6px; }

  #battle-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  #battle-overlay.active { display: flex; }
  #battle-panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    min-width: 320px;
    text-align: center;
  }
  #battle-panel h3 { font-size: 18px; margin-bottom: 4px; }
  #battle-panel .monster-name { color: var(--accent); font-size: 15px; margin-bottom: 16px; }
  #battle-panel .calc { font-size: 13px; color: #9399b2; margin-bottom: 6px; }
  #battle-panel .loss { font-size: 20px; color: var(--danger); font-weight: 700; margin: 12px 0; }
  #battle-panel .remain { font-size: 13px; color: #9399b2; margin-bottom: 20px; }
  #battle-panel .btn-row { display:flex; gap:12px; justify-content:center; }
  #battle-panel button {
    padding: 10px 28px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  #battle-panel .btn-fight { background: #f38ba8; color: #1e1e2e; border-color: #f38ba8; font-weight:600; }
  #battle-panel .btn-fight:hover { background: #f06280; }
  #battle-panel .btn-retreat { background: transparent; color: var(--text); }
  #battle-panel .btn-retreat:hover { background: rgba(255,255,255,0.05); }

  #message {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #message.show { opacity: 1; }
  #message.warn { color: var(--danger); border-color: var(--danger); }

  #victory-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 200;
    flex-direction: column;
    gap: 16px;
  }
  #victory-overlay.active { display: flex; }
  #victory-overlay h1 { font-size: 36px; color: var(--accent); }
  #victory-overlay p { color: var(--text); font-size: 15px; }

    #seed-panel {
    position: fixed; bottom: 28px; left: 185px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    z-index: 10;
    font-size: 11px;
    display: flex; gap: 8px; align-items: center;
    pointer-events: auto;
  }
  #seed-panel .seed-label { color: #9399b2; }
  #seed-panel .seed-val { color: var(--accent); font-family: monospace; font-size: 12px; font-weight: 600; }
  #seed-panel .seed-hint { color: #585b70; font-size: 10px; }

  #quick-battle-bar {
    position: fixed; bottom: 44px; left: 185px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    z-index: 10;
    pointer-events: auto;
  }
  #quick-battle-bar {
    position: fixed; bottom: 158px; right: 16px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    z-index: 10;
    pointer-events: auto;
  }
  #controls-hint {
    position: fixed; bottom: 10px; left: 185px;
    font-size: 10px; color: #585b70;
    z-index: 10;
    pointer-events: none;
  }
  #floor-transition {
    position: fixed; inset: 0;
    background: #000;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 150;
    font-size: 28px;
    color: var(--accent);
  }
</style>
</head>

<div id="hud">

  <div class="stat">

  </div>

    <div class="section-title">⚔️ 装备</div>

    <div class="eq-slot" id="eq-shield" onclick="clickEquipSlot('shield')"><span class="slot-label">盾牌</span><span style="color:#585b70">空</span></div>
    <div class="eq-slot" id="eq-armor" onclick="clickEquipSlot('armor')"><span class="slot-label">护甲</span><span style="color:#585b70">空</span></div>
  </div>
  <div class="hud-section">
    <div class="section-title">🎒 装备包</div>
    <div class="equip-inv" id="equip-inv"></div>
  </div>
  <div class="hud-section">
    <div class="section-title">📦 道具</div>
    <div class="inventory-grid" id="inventory-grid"></div>
  </div>
  <div class="hud-section history">
    <div class="section-title">📜 记录</div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<div id="quick-battle-bar">
  <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:#cdd6f4;cursor:pointer;">
    <input type="checkbox" id="quick-battle-cb" checked style="accent-color:var(--accent);">
    ⚡ 快速战斗
  </label>
</div>
<div id="minimap"><canvas id="minimap-canvas" width="132" height="132"></canvas></div>

<div id="seed-panel">
  <span class="seed-label">🎲 种子</span>
  <span class="seed-val" id="seed-display">----</span>
  <span class="seed-hint">按 G 重新生成</span>
</div>

<div id="quick-battle-bar">
  <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:#cdd6f4;cursor:pointer;">
    <input type="checkbox" id="quick-battle-cb" checked style="accent-color:var(--accent);">
    ⚡ 快速战斗
  </label>
</div>
<div id="controls-hint">方向键/WASD 移动 · 鼠标拖拽旋转 · 滚轮缩放 · R 重置视角</div>

<div id="battle-overlay">
  <div id="battle-panel">
    <h3>⚔️ 遭遇战斗</h3>
    <div class="monster-name" id="battle-monster-name"></div>
    <div class="calc" id="battle-calc"></div>
    <div class="loss" id="battle-loss"></div>
    <div class="remain" id="battle-remain"></div>
    <div class="btn-row">
      <button class="btn-fight" id="btn-fight">战斗</button>
      <button class="btn-retreat" id="btn-retreat">撤退</button>
    </div>
  </div>
</div>

<div id="message"></div>
<div id="floor-transition">⬆ 进入第 N 层</div>
<div id="victory-overlay">
  <h1>🏆 通关！</h1>
  <p>你击败了魔王，拯救了公主！</p>
  <button class="btn-fight" onclick="location.reload()" style="font-size:14px;padding:10px 28px;border-radius:8px;cursor:pointer;background:#f38ba8;color:#1e1e2e;border:none;font-weight:600;">重新开始</button>
</div>

// ============================================================
// HELPER: world position from grid coords
// ============================================================

function gridToWorld(gx, gy) {
  return new THREE.Vector3(gx + 0.5, 0, gy + 0.5);
}

function key(x, y) { return `${x},${y}`; }

// ============================================================
// IS HIDDEN WALL?
// ============================================================

function isHiddenWall(floor, x, y) {
  return HIDDEN_WALLS.some(([f, hx, hy]) => f === floor && hx === x && hy === y);
}

function buildFloor() {
  // Clear dynamic objects
  while (dynGroup.children.length > 0) {
    dynGroup.remove(dynGroup.children[0]);
  }
  doorMeshes = {};
  monsterMeshes = {};
  itemMeshes = {};
  stairMesh = null;
  stairDownMesh = null;
  wallMeshes = {};

  const map = MAPS[state.floor];
  const floor = state.floor;

  // Wall blocks — thick enough to connect with adjacent walls
  const wallGeo = new THREE.BoxGeometry(0.92, 0.37, 0.92);
  const doorGeoH = new THREE.BoxGeometry(0.85, 0.35, 0.10); // E-W passage door
  const doorGeoV = new THREE.BoxGeometry(0.10, 0.35, 0.85); // N-S passage door
  const half = 0.5;

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const tile = map[y][x];
      const pos = gridToWorld(x, y);
      pos.y = 0.5;

      if (tile === TILE.WALL) {
        // Check if it's a hidden wall
        if (isHiddenWall(floor, x, y)) {
          const hwMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.9, metalness: 0.05, transparent:true, opacity: 0.55 });
          const mesh = new THREE.Mesh(wallGeo, hwMat);
          mesh.position.set(pos.x, 0.19, pos.z);
          mesh.castShadow = true;
          dynGroup.add(mesh);
          wallMeshes[key(x,y)] = mesh;
        } else {
          const mesh = new THREE.Mesh(wallGeo, matWall);
          mesh.position.set(pos.x, 0.19, pos.z);
          mesh.castShadow = true;
          // Top cap
          const capGeo = new THREE.BoxGeometry(0.95, 0.06, 0.95);
          const cap = new THREE.Mesh(capGeo, matWall);
          cap.position.y = 0.22;
          mesh.add(cap);
          dynGroup.add(mesh);
          wallMeshes[key(x,y)] = mesh;
        }
      } else if (tile === TILE.YELLOW_DOOR || tile === TILE.BLUE_DOOR || tile === TILE.RED_DOOR) {
        // Detect door orientation: N-S passage vs E-W passage
        const nWalk = y>0 && (map[y-1][x]===0||map[y-1][x]===9||isHiddenWall(floor,x,y-1));
        const sWalk = y<SIZE-1 && (map[y+1][x]===0||map[y+1][x]===9||isHiddenWall(floor,x,y+1));
        const isNS = nWalk && sWalk;
        const geo = isNS ? doorGeoV : doorGeoH;
        let mat;
        if (tile === TILE.YELLOW_DOOR) mat = matYellowDoor;
        else if (tile === TILE.BLUE_DOOR) mat = matBlueDoor;
        else mat = matRedDoor;
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(pos.x, 0.18, pos.z);
        mesh.castShadow = true;
        dynGroup.add(mesh);
        const dtype = tile === TILE.YELLOW_DOOR ? 'yellow' : tile === TILE.BLUE_DOOR ? 'blue' : 'red';
        doorMeshes[key(x,y)] = { mesh, type: dtype };
      } else if (tile === TILE.STAIR_UP) {
        // Ladder: two poles + rungs
        const ladderGroup = new THREE.Group();
        const poleMat = new THREE.MeshStandardMaterial({ color:0x8B6914, roughness:0.5, metalness:0.3 });
        const rungMat = new THREE.MeshStandardMaterial({ color:0xc49a30, roughness:0.4, metalness:0.5, emissive:0x331100, emissiveIntensity:0.6 });
        // Side poles
        for (let sx = -1; sx <= 1; sx += 2) {
          const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.7, 6), poleMat);
          pole.position.set(sx * 0.2, 0.35, 0);
          pole.castShadow = true;
          ladderGroup.add(pole);
        }
        // Cross rungs
        for (let i = 0; i < 5; i++) {
          const rung = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.38, 6), rungMat);
          rung.rotation.z = Math.PI/2;
          rung.position.set(0, 0.1 + i * 0.14, 0);
          rung.castShadow = true;
          ladderGroup.add(rung);
        }
        // Glow base
        const glowGeo = new THREE.RingGeometry(0.25, 0.4, 32);
        const glowMat = new THREE.MeshBasicMaterial({ color:0xf5c842, side:THREE.DoubleSide, transparent:true, opacity:0.35 });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        glow.rotation.x = -Math.PI/2;
        glow.position.y = 0.03;
        ladderGroup.add(glow);
        ladderGroup.position.set(pos.x, 0, pos.z);
        dynGroup.add(ladderGroup);
        stairMesh = ladderGroup;
        stairMesh.glow = glow;
      } else if (tile === TILE.STAIR_DOWN) {
        // Trapdoor with short downward ladder
        const downGroup = new THREE.Group();
        const darkMat = new THREE.MeshStandardMaterial({ color:0x1a1a2a, roughness:0.9, metalness:0.1 });
        // Dark pit ring
        const pitGeo = new THREE.TorusGeometry(0.3, 0.08, 8, 16);
        const pit = new THREE.Mesh(pitGeo, darkMat);
        pit.rotation.x = -Math.PI/2;
        pit.position.y = 0.05;
        pit.castShadow = true;
        downGroup.add(pit);
        // Dark inner circle
        const innerGeo = new THREE.CircleGeometry(0.22, 16);
        const innerMat = new THREE.MeshStandardMaterial({ color:0x0a0a14, roughness:1, side:THREE.DoubleSide });
        const inner = new THREE.Mesh(innerGeo, innerMat);
        inner.rotation.x = -Math.PI/2;
        inner.position.y = 0.06;
        downGroup.add(inner);
        // Short downward poles
        const dpoleMat = new THREE.MeshStandardMaterial({ color:0x5a5a6a, roughness:0.5, metalness:0.3 });
        for (let sx = -1; sx <= 1; sx += 2) {
          const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.35, 6), dpoleMat);
          pole.position.set(sx * 0.15, -0.1, 0);
          downGroup.add(pole);
        }
        // Glow ring (different color from up-stair)
        const dglowGeo = new THREE.RingGeometry(0.22, 0.35, 32);
        const dglowMat = new THREE.MeshBasicMaterial({ color:0x4466aa, side:THREE.DoubleSide, transparent:true, opacity:0.35 });
        const dglow = new THREE.Mesh(dglowGeo, dglowMat);
        dglow.rotation.x = -Math.PI/2;
        dglow.position.y = 0.07;
        downGroup.add(dglow);
        downGroup.position.set(pos.x, 0, pos.z);
        dynGroup.add(downGroup);
        stairDownMesh = downGroup;
      }

      // Floor tile decoration
      if (tile !== TILE.WALL) {
        const tileGeo = new THREE.PlaneGeometry(0.9, 0.9);
        const tileMat = new THREE.MeshStandardMaterial({
          color: tile === TILE.STAIR_UP ? 0x3a3a30 : tile === TILE.STAIR_DOWN ? 0x202030 : 0x2a2a38,
          roughness: 0.8, metalness: 0.05
        });
        const tileMesh = new THREE.Mesh(tileGeo, tileMat);
        tileMesh.rotation.x = -Math.PI/2;
        tileMesh.position.set(pos.x, 0.01, pos.z);
        tileMesh.receiveShadow = true;
        dynGroup.add(tileMesh);
      }
    }
  }

  // Spawn monsters
  const mDefs = MONSTERS[floor] || [];
  currentMonsters = [];
  for (const [type, mx, my] of mDefs) {
    if (defeatedThisFloor.has(key(mx, my))) continue;
    const mData = MONSTER_DB[type];
    const mesh = createMonsterMesh(mData, mx, my);
    dynGroup.add(mesh);
    monsterMeshes[key(mx, my)] = { mesh, type, data: mData };
    currentMonsters.push({ type, x: mx, y: my, data: mData });
  }

  // Spawn chests
  for (const c of CHESTS) {
    if (c[0] !== floor) continue;
    const ck = `${c[0]},${c[1]},${c[2]}`;
    if (openedChests.has(ck)) continue;
    const chestGroup = new THREE.Group();
    const chestBody = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.25, 0.3), new THREE.MeshStandardMaterial({color:0x8B6914, roughness:0.4, metalness:0.5}));
    chestBody.position.y = 0.18;
    chestBody.castShadow = true;
    chestGroup.add(chestBody);
    const chestLid = new THREE.Mesh(new THREE.BoxGeometry(0.44, 0.08, 0.32), new THREE.MeshStandardMaterial({color:0xa07820, roughness:0.3, metalness:0.6, emissive:0x221100, emissiveIntensity:0.4}));
    chestLid.position.y = 0.32;
    chestGroup.add(chestLid);
    const pos = gridToWorld(c[1], c[2]);
    chestGroup.position.set(pos.x, 0, pos.z);
    chestGroup.userData = { floatOffset: Math.random() * Math.PI * 2, isChest: true };
    dynGroup.add(chestGroup);
    itemMeshes[key(c[1],c[2])] = { mesh: chestGroup, type: 'chest' };
    currentItems.push({ type: 'chest', x: c[1], y: c[2] });
  }

  // Spawn items
  const iDefs = ITEMS[floor] || [];
  currentItems = [];
  for (const [itype, ix, iy] of iDefs) {
    const mesh = createItemMesh(itype, ix, iy);
    dynGroup.add(mesh);
    itemMeshes[key(ix, iy)] = { mesh, type: itype };
    currentItems.push({ type: itype, x: ix, y: iy });
  }

  // Create player
  createPlayerMesh();

  // Compass direction markers on floor edges
  addCompassMarkers();

  updateHUD();
  updateMinimap();
}

function addCompassMarkers() {
  // N/E/S/W markers on floor edges
  const dirs = [
    { label:'N', x:SIZE/2, z:0.3, rot:0 },
    { label:'S', x:SIZE/2, z:SIZE-0.3, rot:Math.PI },
    { label:'E', x:SIZE-0.3, z:SIZE/2, rot:-Math.PI/2 },
    { label:'W', x:0.3, z:SIZE/2, rot:Math.PI/2 },
  ];
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#888888';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  dirs.forEach(({label, x, z, rot}) => {
    ctx.clearRect(0, 0, 64, 64);
    ctx.fillText(label, 32, 32);
    const tex = new THREE.CanvasTexture(canvas);
    tex.minFilter = THREE.LinearFilter;
    const spriteMat = new THREE.SpriteMaterial({ map:tex, transparent:true, opacity:0.5 });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(x, 0.06, z);
    sprite.scale.set(0.7, 0.7, 1);
    sprite.rotation.z = rot;
    dynGroup.add(sprite);
  });
}

function calcBattlePreview(monsterType) {
  const m = MONSTER_DB[monsterType];
  const s = getStats();
  const pDmg = Math.max(s.atk - m.def, 1);
  const mDmg = Math.max(m.atk - s.def, 1);
  const avgPDmg = pDmg * (1 + s.critRate * (s.critDmg - 1)) * (1 - s.missChance);
  const avgRounds = Math.ceil(m.hp / Math.max(1, avgPDmg));
  const estLoss = Math.round(avgRounds * mDmg * (1 - s.enemyMissChance));
  // Show 80% as conservative estimate
  const displayLoss = Math.round(estLoss * 0.8);
  return { monster: m, estLoss: displayLoss, fullEstLoss: estLoss, pDmg, mDmg, canWin: estLoss < state.hp, s };
}

function doBattle(mx, my) {
  const info = monsterMeshes[key(mx, my)];
  if (!info || battleAnimating) return;
  
  const m = MONSTER_DB[info.type];
  const s = getStats();
  const pRawDmg = Math.max(s.atk - m.def, 1);
  const mRawDmg = Math.max(m.atk - s.def, 1);
  const quickBattle = document.getElementById('quick-battle-cb')?.checked ?? true;
  
  let log = [];
  let pHp = state.hp, mHp = m.hp;
  let loss;
  
  if (quickBattle) {
    // Deterministic: use expected values, no randomness
    const avgPDmg = pRawDmg * (1 + s.critRate * (s.critDmg - 1)) * (1 - s.missChance);
    const rounds = Math.ceil(m.hp / Math.max(1, avgPDmg));
    const estMDmg = mRawDmg * (1 - s.enemyMissChance);
    loss = Math.round(rounds * estMDmg * 0.8); // Conservative 80%
    pHp = state.hp - loss;
    mHp = 0;
    log.push({actor:'player',type:'hit',dmg:Math.round(avgPDmg)});
    if (rounds > 1) log.push({actor:'player',type:'hit',dmg:Math.round(m.hp - avgPDmg)});
  } else {
    // Full random simulation
    const pInterval = 1.0 / s.atkSpeed;
    const mInterval = 1.0 / (m.atkSpeed || 0.8);
    let pNext = 0, mNext = 0;
    while (pHp > 0 && mHp > 0) {
      if (pNext <= mNext) {
        const roll = Math.random();
        if (roll < s.missChance) {
          log.push({actor:'player',type:'miss'});
        } else {
          const isCrit = roll < s.missChance + s.critRate;
          const dmg = Math.round(isCrit ? pRawDmg * s.critDmg : pRawDmg);
          mHp -= dmg;
          log.push({actor:'player',type:isCrit?'crit':'hit',dmg});
          if (Math.random() < s.stunChance && mHp > 0) {
            mNext += 0.6;
            log.push({actor:'player',type:'stun'});
          }
        }
        pNext += pInterval;
      } else {
        const roll = Math.random();
        if (roll < s.enemyMissChance) {
          log.push({actor:'monster',type:'miss'});
        } else {
          pHp -= mRawDmg;
          log.push({actor:'monster',type:'hit',dmg:mRawDmg});
        }
        mNext += mInterval;
      }
    }
    loss = state.hp - Math.max(0, pHp);
  }
  
  const won = mHp <= 0;
  
  if (!won) {
    showMessage('⚠️ 战斗力不足！先提升属性再来', true);
    return;
  }
  
  // Apply damage and rewards
  state.hp = Math.max(0, pHp);
  state.gold += m.gold;
  state.monstersKilled++;
  
  // Animate battle log
  battleAnimating = true;
  animateBattleLog(log, info.mesh, () => {
    // Remove monster
    defeatedThisFloor.add(key(mx, my));
    delete monsterMeshes[key(mx, my)];
    dynGroup.remove(info.mesh);
    battleAnimating = false;
    updateHUD();
    updateMinimap();
    updateMonsterLabels();
    showMessage(`击败${m.name}！损失 ${loss} HP`, false);
    
    // Boss check
    if (info.type === 7 && state.floor === MAPS.length - 1) {
      setTimeout(() => document.getElementById('victory-overlay').classList.add('active'), 600);
    }
    // Boss drop
    if (info.type === 7) {
      const dropId = BOSS_DROPS[Math.floor(Math.random() * BOSS_DROPS.length)];
      state.equipInv.push(dropId);
      showMessage(`🎁 Boss掉落: ${EQUIPMENT[dropId].icon} ${EQUIPMENT[dropId].name}`, false);
    }
    // Random equipment drop (5% chance)
    if (Math.random() < 0.05 && info.type >= 4) {
      const pool = ['frost_edge','bone_crusher','round_buckler','shadow_leather','chainmail'];
      const dropId = pool[Math.floor(Math.random() * pool.length)];
      state.equipInv.push(dropId);
      showMessage(`🎁 掉落装备: ${EQUIPMENT[dropId].icon} ${EQUIPMENT[dropId].name}`, false);
    }
    
    if (state.hp <= 0) {
      setTimeout(() => alert('💀 你倒下了...刷新页面重新开始。'), 500);
    }
  });
}

function animateBattleLog(log, monsterMesh, onDone) {
  let i = 0;
  const interval = setInterval(() => {
    if (i >= log.length || !monsterMesh.parent) {
      clearInterval(interval);
      if (onDone) onDone();
      return;
    }
    const entry = log[i];
    const worldPos = monsterMesh.position.clone();
    worldPos.y += 1.2;
    const screenPos = worldPos.clone().project(camera);
    const sx = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
    
    let text, color;
    if (entry.actor === 'player') {
      if (entry.type === 'miss') { text = 'MISS'; color = '#888'; }
      else if (entry.type === 'crit') { text = `💥${entry.dmg}`; color = '#ff0'; }
      else if (entry.type === 'stun') { text = '⚡眩晕'; color = '#8af'; }
      else { text = `-${entry.dmg}`; color = '#fff'; }
    } else {
      if (entry.type === 'miss') { text = '闪避'; color = '#8f8'; }
      else { text = `-${entry.dmg}`; color = '#f66'; }
    }
    
    const el = document.createElement('div');
    el.className = 'float-text';
    el.textContent = text;
    el.style.color = color;
    el.style.left = sx + 'px';
    el.style.top = sy + 'px';
    el.style.fontWeight = entry.type === 'crit' ? '900' : '600';
    el.style.fontSize = entry.type === 'crit' ? '20px' : '14px';
    document.body.appendChild(el);
    requestAnimationFrame(() => { el.style.transform = 'translateY(-36px)'; el.style.opacity = '0'; });
    setTimeout(() => el.remove(), 900);
    
    i++;
  }, 180);
}

function updateMonsterLabels() {
  document.querySelectorAll('.monster-hp-label').forEach(el => el.remove());
  for (const info of Object.values(monsterMeshes)) {
    const preview = calcBattlePreview(info.type);
    const worldPos = info.mesh.position.clone();
    worldPos.y += 1.1;
    const screenPos = worldPos.clone().project(camera);
    const sx = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
    const label = document.createElement('div');
    label.className = 'monster-hp-label';
    label.innerHTML = `<span style="color:${preview.canWin?'#ff6666':'#888'}">${preview.canWin ? '-'+preview.estLoss+'HP' : '⚠️'}</span>`;
    label.style.left = sx + 'px';
    label.style.top = (sy - 24) + 'px';
    document.body.appendChild(label);
  }
}

function moveTo(nx, ny) {
  if (isMoving) return;
  const walkResult = canWalk(nx, ny);

  if (walkResult === false) return;

  if (walkResult === 'locked') {
    showMessage('🔒 没有对应的钥匙！', true);
    return;
  }

  if (walkResult === 'monster') {
    doBattle(nx, ny);
    return;
  }

  // Handle door opening
  if (walkResult === 'yellow_door') {
    state.yellowKeys--;
    MAPS[state.floor][ny][nx] = TILE.FLOOR;
    removeDoor(nx, ny);
  } else if (walkResult === 'blue_door') {
    state.blueKeys--;
    MAPS[state.floor][ny][nx] = TILE.FLOOR;
    removeDoor(nx, ny);
  } else if (walkResult === 'red_door') {
    state.redKeys--;
    MAPS[state.floor][ny][nx] = TILE.FLOOR;
    removeDoor(nx, ny);
  }

  // Move player
  state.px = nx;
  state.py = ny;
  state.steps++;
  animateMove(nx, ny);

  // Pickup items
  pickupItems(nx, ny);

  // Check stairs
  checkStairs(nx, ny);

  // Check chests
  openChestIfPresent(nx, ny);

  // Check hidden wall discovery
  if (isHiddenWall(state.floor, nx, ny)) {
    showMessage('🔍 发现了隐藏通道！', false);
  }
}

function removeDoor(x, y) {
  const dk = key(x, y);
  if (doorMeshes[dk]) {
    dynGroup.remove(doorMeshes[dk].mesh);
    delete doorMeshes[dk];
  }
  showMessage('🔑 门已打开', false);
}

function pickupItems(x, y) {
  const ik = key(x, y);
  if (!itemMeshes[ik]) return;

  const info = itemMeshes[ik];
  if (info.type === 'chest') return; // Chests handled separately
  const itype = info.type;
  let msg = '';

  switch (itype) {
    case ITEM.RED_GEM:   state.baseAtk += 3; msg = '获得红宝石！攻击力 +3'; inventory.push({icon:'💎',name:'红宝石+3ATK'}); break;
    case ITEM.BLUE_GEM:  state.baseDef += 3; msg = '获得蓝宝石！防御力 +3'; inventory.push({icon:'💠',name:'蓝宝石+3DEF'}); break;
    case ITEM.RED_POTION:  state.hp = Math.min(state.hp + 100, state.maxHp); state.maxHp = Math.max(state.maxHp, state.hp); msg = '获得红血瓶！生命 +100'; inventory.push({icon:'🧪',name:'红血瓶+100HP'}); break;
    case ITEM.BLUE_POTION: state.hp = Math.min(state.hp + 500, state.maxHp); state.maxHp = Math.max(state.maxHp, state.hp); msg = '获得蓝血瓶！生命 +500'; inventory.push({icon:'🧪',name:'蓝血瓶+500HP'}); break;
    case ITEM.YELLOW_KEY: state.yellowKeys++; msg = '获得黄钥匙'; inventory.push({icon:'🔑',name:'黄钥匙'}); break;
    case ITEM.BLUE_KEY:   state.blueKeys++; msg = '获得蓝钥匙'; inventory.push({icon:'🔑',name:'蓝钥匙'}); break;
    case ITEM.RED_KEY:    state.redKeys++; msg = '获得红钥匙'; inventory.push({icon:'🔑',name:'红钥匙'}); break;
  }

  // Remove item from scene
  const mesh = info.mesh;
  const shrink = { scale: 1 };
  const animId = setInterval(() => {
    shrink.scale -= 0.1;
    mesh.scale.setScalar(Math.max(shrink.scale, 0));
    if (shrink.scale <= 0) {
      clearInterval(animId);
      dynGroup.remove(mesh);
      delete itemMeshes[ik];
    }
  }, 20);

  showMessage(msg, false);
  updateHUD();
  updateMinimap();
}

function checkStairs(x, y) {
  const map = MAPS[state.floor];
  if (map[y][x] === TILE.STAIR_UP) {
    if (state.floor >= MAPS.length - 1) {
      document.getElementById('victory-overlay').classList.add('active');
      return;
    }
    goToFloor(state.floor + 1);
  } else if (map[y][x] === TILE.STAIR_DOWN) {
    if (state.floor <= 0) return;
    goToFloor(state.floor - 1);
  }
}

function findStairPos(floor, tileType) {
  const map = MAPS[floor];
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++)
      if (map[y][x] === tileType) return [x, y];
  return [1, 1];
}

function goToFloor(newFloor) {
  isMoving = false;
  pendingAnimFrames.forEach(id => cancelAnimationFrame(id));
  pendingAnimFrames = [];

  const wasGoingUp = newFloor > state.floor;
  state.floor = newFloor;

  // Spawn at matching stair position on target floor
  if (newFloor === 0) {
    state.px = FLOOR_0_START[0];
    state.py = FLOOR_0_START[1];
  } else if (wasGoingUp) {
    // Going UP: appear at target floor's STAIR_DOWN
    const pos = findStairPos(newFloor, TILE.STAIR_DOWN);
    state.px = pos[0]; state.py = pos[1];
  } else {
    // Going DOWN: appear at target floor's STAIR_UP
    const pos = findStairPos(newFloor, TILE.STAIR_UP);
    state.px = pos[0]; state.py = pos[1];
  }

  defeatedThisFloor = new Set();

  const trans = document.getElementById('floor-transition');
  trans.textContent = `${wasGoingUp ? '⬆' : '⬇'} 进入第 ${newFloor + 1} 层`;
  trans.style.display = 'flex';
  setTimeout(() => { trans.style.display = 'none'; }, 800);

  buildFloor();
  showMessage(`${wasGoingUp ? '⬆' : '⬇'} 进入第 ${newFloor + 1} 层`, false);
}

function animateMove(nx, ny) {
  isMoving = true;
  const target = gridToWorld(nx, ny);
  const startPos = playerMesh.position.clone();
  const startTime = performance.now();
  const duration = 120;

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    playerMesh.position.lerpVectors(startPos, target, ease);
    if (t < 1) {
      const id = requestAnimationFrame(animate);
      pendingAnimFrames.push(id);
    } else {
      playerMesh.position.copy(target);
      isMoving = false;
      updatePlayerLight();
      updateMinimap();
    }
  }
  const id1 = requestAnimationFrame(animate);
  pendingAnimFrames.push(id1);

  // Bounce effect
  const bounceStart = performance.now();
  function bounce(now) {
    const elapsed = now - bounceStart;
    if (elapsed > duration) { playerMesh.position.y = 0; return; }
    const t = elapsed / duration;
    const yOffset = Math.sin(t * Math.PI) * 0.3;
    playerMesh.position.y = yOffset;
    if (elapsed < duration) {
      const id = requestAnimationFrame(bounce);
      pendingAnimFrames.push(id);
    } else {
      playerMesh.position.y = 0;
    }
  }
  const id2 = requestAnimationFrame(bounce);
  pendingAnimFrames.push(id2);
}

function updatePlayerLight() {
  const pos = playerMesh.position;
  playerLight.position.set(pos.x, 2, pos.z);
}

function updateHUD() {
  document.getElementById('floor-label').textContent = `第 ${state.floor + 1} 层`;
  document.getElementById('hp-val').textContent = state.hp;
  // removed old state.atk
  // removed old state.def
  document.getElementById('gold-val').textContent = state.gold;
  document.getElementById('yk-val').textContent = state.yellowKeys;
  document.getElementById('bk-val').textContent = state.blueKeys;
  document.getElementById('rk-val').textContent = state.redKeys;
  document.getElementById('steps-val').textContent = state.steps;
  document.getElementById('kills-val').textContent = state.monstersKilled;

  const s = getStats();
  document.getElementById('atk-val').textContent = s.atk;
  document.getElementById('def-val').textContent = s.def;
  const score = state.monstersKilled * 150 + state.gold * 12 + s.atk * 8 + s.def * 8 + state.hp - state.steps * 5;
  document.getElementById('score-val').textContent = Math.max(0, score);

  // Equipment slots
  for (const slot of ['weapon','shield','armor']) {
    const el = document.getElementById('eq-' + slot);
    if (el) {
      const eq = state[slot];
      el.innerHTML = eq ? `${eq.icon} ${eq.name}` : '<span style="color:#585b70">空</span>';
      el.style.color = eq ? 'var(--accent)' : '#585b70';
      el.style.cursor = eq ? 'pointer' : 'default';

  // Equipment inventory
  const eqInv = document.getElementById('equip-inv');

    }).join('');
  }

  // Inventory icons
  const invGrid = document.getElementById('inventory-grid');
  invGrid.innerHTML = inventory.slice(-12).map(i => `<span class="inv-item" title="${i.name}">${i.icon}</span>`).join('');

  // History log
  const histList = document.getElementById('history-list');
  histList.innerHTML = history.slice(-MAX_HISTORY).map(h =>
    `<div class="history-entry">${h}</div>`
  ).join('');
}

function updateMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  const ctx = canvas.getContext('2d');
  const cs = 12; // cell size
  ctx.clearRect(0, 0, 132, 132);

  const map = MAPS[state.floor];
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const tile = map[y][x];
      if (tile === TILE.WALL) {
        if (isHiddenWall(state.floor, x, y)) {
          ctx.fillStyle = '#2a2a3a';
        } else {
          ctx.fillStyle = '#1a1a2a';
        }
      } else if (tile === TILE.FLOOR || tile === TILE.STAIR_UP || tile === TILE.STAIR_DOWN) {
        ctx.fillStyle = '#2a2a38';
      } else if (tile === TILE.YELLOW_DOOR) ctx.fillStyle = '#f5c842';
      else if (tile === TILE.BLUE_DOOR) ctx.fillStyle = '#89b4fa';
      else if (tile === TILE.RED_DOOR) ctx.fillStyle = '#f38ba8';
      else ctx.fillStyle = '#333';
      ctx.fillRect(x * cs, y * cs, cs, cs);

      if (tile === TILE.STAIR_UP) {
        ctx.fillStyle = '#f5c842';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('▲', x * cs + cs/2, y * cs + cs - 1);
      } else if (tile === TILE.STAIR_DOWN) {
        ctx.fillStyle = '#4466aa';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('▼', x * cs + cs/2, y * cs + cs - 1);
      }
    }
  }

  // Draw monsters
  for (const [mx, my, info] of Object.entries(monsterMeshes).map(([k,v]) => {
    const [x,y] = k.split(',').map(Number);
    return [x,y,v];
  })) {
    ctx.fillStyle = '#' + info.data.color.toString(16).padStart(6,'0');
    ctx.beginPath();
    ctx.arc(mx * cs + cs/2, my * cs + cs/2, 4, 0, Math.PI*2);
    ctx.fill();
  }

  // Draw items
  for (const ik of Object.keys(itemMeshes)) {
    const [x,y] = ik.split(',').map(Number);
    const itype = itemMeshes[ik].type;
    if (itype === ITEM.RED_GEM) ctx.fillStyle = '#ff3333';
    else if (itype === ITEM.BLUE_GEM) ctx.fillStyle = '#3388ff';
    else if (itype === ITEM.RED_POTION || itype === ITEM.BLUE_POTION) ctx.fillStyle = '#cc2222';
    else ctx.fillStyle = '#dddd44';
    ctx.fillRect(x * cs + 4, y * cs + 4, 4, 4);
  }

  // Draw player
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(state.px * cs + cs/2, state.py * cs + cs/2, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
}

function showMessage(text, isWarn) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = isWarn ? 'show warn' : 'show';
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => { el.className = ''; }, 2000);
  // Add to history
  const prefix = isWarn ? '⚠️ ' : '';
  history.push(prefix + text);
  if (history.length > MAX_HISTORY * 2) history.splice(0, history.length - MAX_HISTORY * 2);
  updateHUD();
}

function handleInput() {
  if (isMoving) return;
  if (document.getElementById('battle-overlay').classList.contains('active')) return;
  if (document.getElementById('victory-overlay').classList.contains('active')) return;

  let dx = 0, dy = 0;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
  else if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;
  else if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
  else if (keys['r'] || keys['R']) { resetCamera(); keys['r'] = false; keys['R'] = false; return; }

  if (dx === 0 && dy === 0) return;

  // Clear key immediately to prevent repeated moves
  keys['ArrowUp'] = keys['w'] = keys['W'] = false;
  keys['ArrowDown'] = keys['s'] = keys['S'] = false;
  keys['ArrowLeft'] = keys['a'] = keys['A'] = false;
  keys['ArrowRight'] = keys['d'] = keys['D'] = false;

  moveTo(state.px + dx, state.py + dy);
}

    const gy = Math.floor(point.z);
    if (gx >= 0 && gx < SIZE && gy >= 0 && gy < SIZE) {
      // Simple path: just try to move directly if adjacent
      if (Math.abs(gx - state.px) + Math.abs(gy - state.py) === 1) {

      }
    }
  }
});

// ============================================================
// GAME LOOP
// ============================================================

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const time = performance.now() * 0.001;

  controls.update();

  // Camera snap: auto-align to nearest 90° when not rotating
  const isDragging = controls._isDragging || false;
  if (!isDragging) {
    const azimuth = controls.getAzimuthalAngle();
    const target = Math.round(azimuth / (Math.PI/2)) * (Math.PI/2);
    if (Math.abs(azimuth - target) > 0.005) {
      const newAzimuth = azimuth + (target - azimuth) * 0.12;
      // Reconstruct spherical coords
      const spherical = new THREE.Spherical();
      spherical.setFromVector3(camera.position.clone().sub(controls.target));
      spherical.theta = newAzimuth;
      const newPos = new THREE.Vector3().setFromSpherical(spherical).add(controls.target);
      camera.position.copy(newPos);
      camera.lookAt(controls.target);
    }
  }

  // Float chests
  for (const entry of Object.values(itemMeshes)) {
    const ud = entry.mesh.userData;
    if (ud && ud.isChest) {
      entry.mesh.position.y = Math.sin(time * 1.5 + ud.floatOffset) * 0.05;
    }
  }

  // Float items (groups, float the whole group)
  for (const entry of Object.values(itemMeshes)) {
    const ud = entry.mesh.userData;
    entry.mesh.position.y = Math.sin(time * 2.5 + ud.floatOffset) * 0.1;
    entry.mesh.rotation.y += dt * 1.2;
  }

  // Float monsters slightly
  for (const info of Object.values(monsterMeshes)) {
    const ud = info.mesh.userData;
    info.mesh.position.y = Math.sin(time * 2 + ud.floatOffset) * 0.06;
  }

  // Stair glow pulse
  if (stairMesh && stairMesh.glow) {
    stairMesh.glow.material.opacity = 0.25 + Math.sin(time * 3) * 0.15;
  }
  // Down stair glow
  if (stairDownMesh) {
    stairDownMesh.children.forEach(c => {
      if (c.material && c.material.color && c.material.color.getHex() === 0x4466aa) {
        c.material.opacity = 0.25 + Math.sin(time * 2.5) * 0.15;
      }
    });
  }

  updatePlayerLight();
  updateMonsterLabels();
  renderer.render(scene, camera);
}

let openedChests = new Set();

function openChestIfPresent(x, y) {
  for (const c of CHESTS) {
    if (c[0] === state.floor && c[1] === x && c[2] === y) {
      const ck = `${c[0]},${c[1]},${c[2]}`;
      if (openedChests.has(ck)) return;
      openedChests.add(ck);
      const eq = EQUIPMENT[c[3]];
      state.equipInv.push(c[3]);
      
      // Remove chest from scene
      const mesh = itemMeshes[key(x, y)];
      if (mesh) {
        const animId = setInterval(() => {
          if (mesh.mesh.scale.x <= 0) { clearInterval(animId); dynGroup.remove(mesh.mesh); delete itemMeshes[key(x, y)]; }
          mesh.mesh.scale.setScalar(Math.max(0, mesh.mesh.scale.x - 0.1));
        }, 20);
      }
      
      const msgEl = document.getElementById('chest-message');
      msgEl.innerHTML = `<div style="font-size:24px">🎁</div>
        <div style="font-weight:700;color:var(--accent);margin:6px 0">${eq.name}</div>
        <div style="font-size:12px;color:#9399b2">${eq.desc}</div>
        <div style="font-size:11px;color:#9399b2;margin-top:2px">${formatEqStats(eq)}</div>
        <button onclick="document.getElementById('chest-message').classList.remove('active')" style="margin-top:8px;padding:4px 16px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-family:inherit">确定</button>`;
      msgEl.classList.add('active');
      
      updateHUD();
      showMessage(`🎁 获得装备: ${eq.name}`, false);
      return;
    }
  }
}

function formatEqStats(eq) {
  const parts = [];
  if (eq.atk) parts.push(`ATK+${eq.atk}`);
  if (eq.def) parts.push(`DEF+${eq.def}`);
  if (eq.atkSpeed) parts.push(`攻速${eq.atkSpeed>0?'+':''}${(eq.atkSpeed*100).toFixed(0)}%`);
  if (eq.critRate) parts.push(`暴击${eq.critRate>0?'+':''}${(eq.critRate*100).toFixed(0)}%`);
  if (eq.critDmg) parts.push(`暴伤${eq.critDmg>0?'+':''}${(eq.critDmg*100).toFixed(0)}%`);
  if (eq.missChance) parts.push(`失手${eq.missChance>0?'+':''}${(eq.missChance*100).toFixed(0)}%`);
  if (eq.stunChance) parts.push(`眩晕${(eq.stunChance*100).toFixed(0)}%`);
  if (eq.enemyMissChance) parts.push(`敌失手${(eq.enemyMissChance*100).toFixed(0)}%`);
  return parts.join(' · ');
}

window.clickEquipSlot = function(slot) {
  const current = state[slot];
  if (current) {
    // Unequip
    state.equipInv.push(null); // placeholder - find the id
    // Actually store the id
    for (const [id, eq] of Object.entries(EQUIPMENT)) {
      if (eq.name === current.name) {
        state.equipInv.push(id);
        break;
      }
    }
    state[slot] = null;
    updateHUD();
    showMessage(`卸下 ${current.name}`, false);
  } else {
    // Show inventory to equip
    if (state.equipInv.length === 0) {
      showMessage('背包中没有装备', true);
      return;
    }
    // Equip first available item for this slot
    for (let i = 0; i < state.equipInv.length; i++) {
      const id = state.equipInv[i];
      const eq = EQUIPMENT[id];
      if (eq && eq.slot === slot) {
        // Check hands constraint
        const handsUsed = (state.weapon ? (state.weapon.hands || 1) : 0) + (state.shield ? (state.shield.hands || 0) : 0);
        const newHands = eq.hands || 0;
        // If equipping weapon with 2 hands, unequip shield
        if (slot === 'weapon' && newHands === 2 && state.shield) {
          for (const [sid, se] of Object.entries(EQUIPMENT)) {
            if (se.name === state.shield.name) { state.equipInv.push(sid); break; }
          }
          state.shield = null;
        }
        // If equipping shield and weapon is 2-handed, unequip weapon
        if (slot === 'shield' && state.weapon && (state.weapon.hands || 1) === 2) {
          for (const [wid, we] of Object.entries(EQUIPMENT)) {
            if (we.name === state.weapon.name) { state.equipInv.push(wid); break; }
          }
          state.weapon = null;
        }
        state[slot] = eq;
        state.equipInv.splice(i, 1);
        updateHUD();
        showMessage(`装备 ${eq.icon} ${eq.name}`, false);
        return;
      }
    }
    showMessage('没有可装备的物品', true);
  }
};

// Click on equipment inventory to equip
document.addEventListener('click', (e) => {
  const eqItem = e.target.closest('.eq-item');
  if (!eqItem) return;
  const id = eqItem.dataset.eqId;
  const idx = parseInt(eqItem.dataset.eqIdx);
  const eq = EQUIPMENT[id];
  if (!eq) return;
  
  const slot = eq.slot;
  // If slot occupied, unequip current first
  if (state[slot]) {
    for (const [oid, oe] of Object.entries(EQUIPMENT)) {
      if (oe.name === state[slot].name) { state.equipInv.push(oid); break; }
    }
  }
  
  // Hands constraint
  if (slot === 'weapon' && (eq.hands || 1) === 2 && state.shield) {
    for (const [sid, se] of Object.entries(EQUIPMENT)) {
      if (se.name === state.shield.name) { state.equipInv.push(sid); break; }
    }
    state.shield = null;
  }
  if (slot === 'shield' && state.weapon && (state.weapon.hands || 1) === 2) {
    for (const [wid, we] of Object.entries(EQUIPMENT)) {
      if (we.name === state.weapon.name) { state.equipInv.push(wid); break; }
    }
    state.weapon = null;
  }
  
  state[slot] = eq;
  state.equipInv.splice(idx, 1);
  updateHUD();
  showMessage(`装备 ${eq.icon} ${eq.name}`, false);
});
