<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D魔塔</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel-bg: rgba(10,10,20,0.92);
    --text: #cdd6f4;
    --accent: #f5c842;
    --danger: #f38ba8;
    --blue: #89b4fa;
    --green: #a6e3a1;
    --border: rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    overflow: hidden;
    font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
    color: var(--text);
    user-select: none;
    -webkit-user-select: none;
    height: 100vh;
    width: 100vw;
  }
  canvas { display:block; }
  #hud {
    position: fixed; top: 0; left: 0;
    height: 100vh;
    width: 175px;
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    padding: 14px 14px;
    backdrop-filter: blur(12px);
    z-index: 10;
    pointer-events: none;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  #hud .floor { font-size: 14px; color: var(--accent); margin-bottom: 8px; font-weight:600; }
  #hud .stat { display:flex; justify-content:space-between; padding:3px 0; font-size:13px; }
  #hud .stat .label { color: var(--text); }
  #hud .stat .val { font-weight:600; }
  #hud .hp .val { color: var(--danger); }
  #hud .atk .val { color: #fab387; }
  #hud .def .val { color: var(--blue); }
  #hud .gold .val { color: var(--accent); }
  #hud .keys { margin-top: 6px; padding-top: 8px; border-top: 1px solid var(--border); display:flex; gap:12px; font-size:12px; }
  #hud .key { display:flex; align-items:center; gap:4px; }
  .key-dot { width:10px; height:10px; border-radius:50%; }
  .key-dot.yellow { background:#f5c842; box-shadow:0 0 6px #f5c842; }
  .key-dot.blue { background:#89b4fa; box-shadow:0 0 6px #89b4fa; }
  .key-dot.red { background:#f38ba8; box-shadow:0 0 6px #f38ba8; }

  #hud .hud-section { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); flex-shrink:0; }
  #hud .hud-section.history { flex:1; overflow:hidden; display:flex; flex-direction:column; min-height:0; }
  #hud .section-title { font-size:10px; color:#9399b2; margin-bottom:4px; font-weight:600; letter-spacing:0.5px; }
  #hud .inventory-grid { display:flex; flex-wrap:wrap; gap:3px; min-height:18px; }
  #hud .inv-item { font-size:14px; line-height:1; opacity:0.9; }
  #hud .history-list { flex:1; overflow-y:auto; min-height:0; }
  #hud .history-entry { font-size:10px; color:#9399b2; padding:1px 0; word-break:break-all; line-height:1.3; }
  #hud .history-entry:first-child { color:#cdd6f4; }

  #minimap {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
    z-index: 10;
  }
  #minimap canvas { display:block; border-radius: 6px; }

  #battle-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  #battle-overlay.active { display: flex; }
  #battle-panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    min-width: 320px;
    text-align: center;
  }
  #battle-panel h3 { font-size: 18px; margin-bottom: 4px; }
  #battle-panel .monster-name { color: var(--accent); font-size: 15px; margin-bottom: 16px; }
  #battle-panel .calc { font-size: 13px; color: #9399b2; margin-bottom: 6px; }
  #battle-panel .loss { font-size: 20px; color: var(--danger); font-weight: 700; margin: 12px 0; }
  #battle-panel .remain { font-size: 13px; color: #9399b2; margin-bottom: 20px; }
  #battle-panel .btn-row { display:flex; gap:12px; justify-content:center; }
  #battle-panel button {
    padding: 10px 28px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  #battle-panel .btn-fight { background: #f38ba8; color: #1e1e2e; border-color: #f38ba8; font-weight:600; }
  #battle-panel .btn-fight:hover { background: #f06280; }
  #battle-panel .btn-retreat { background: transparent; color: var(--text); }
  #battle-panel .btn-retreat:hover { background: rgba(255,255,255,0.05); }

  #message {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #message.show { opacity: 1; }
  #message.warn { color: var(--danger); border-color: var(--danger); }

  #victory-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 200;
    flex-direction: column;
    gap: 16px;
  }
  #victory-overlay.active { display: flex; }
  #victory-overlay h1 { font-size: 36px; color: var(--accent); }
  #victory-overlay p { color: var(--text); font-size: 15px; }

  #controls-hint {
    position: fixed; bottom: 10px; left: 185px;
    font-size: 10px; color: #585b70;
    z-index: 10;
    pointer-events: none;
  }
  #floor-transition {
    position: fixed; inset: 0;
    background: #000;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 150;
    font-size: 28px;
    color: var(--accent);
  }
</style>
</head>
<body>

<div id="hud">
  <div class="floor" id="floor-label">第 1 层</div>
  <div class="stat hp"><span class="label">❤️ 生命</span><span class="val" id="hp-val">400</span></div>
  <div class="stat atk"><span class="label">⚔️ 攻击</span><span class="val" id="atk-val">10</span></div>
  <div class="stat def"><span class="label">🛡️ 防御</span><span class="val" id="def-val">10</span></div>
  <div class="stat gold"><span class="label">💰 金币</span><span class="val" id="gold-val">0</span></div>
  <div class="keys">
    <div class="key"><span class="key-dot yellow"></span> <span id="yk-val">1</span></div>
    <div class="key"><span class="key-dot blue"></span> <span id="bk-val">0</span></div>
    <div class="key"><span class="key-dot red"></span> <span id="rk-val">0</span></div>
  </div>
  <div class="hud-section">
    <div class="section-title">📦 背包</div>
    <div class="inventory-grid" id="inventory-grid"></div>
  </div>
  <div class="hud-section history">
    <div class="section-title">📜 记录</div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<div id="minimap"><canvas id="minimap-canvas" width="132" height="132"></canvas></div>
<div id="controls-hint">方向键/WASD 移动 · 鼠标拖拽旋转 · 滚轮缩放 · R 重置视角</div>

<div id="battle-overlay">
  <div id="battle-panel">
    <h3>⚔️ 遭遇战斗</h3>
    <div class="monster-name" id="battle-monster-name"></div>
    <div class="calc" id="battle-calc"></div>
    <div class="loss" id="battle-loss"></div>
    <div class="remain" id="battle-remain"></div>
    <div class="btn-row">
      <button class="btn-fight" id="btn-fight">战斗</button>
      <button class="btn-retreat" id="btn-retreat">撤退</button>
    </div>
  </div>
</div>

<div id="message"></div>
<div id="floor-transition">⬆ 进入第 N 层</div>
<div id="victory-overlay">
  <h1>🏆 通关！</h1>
  <p>你击败了魔王，拯救了公主！</p>
  <button class="btn-fight" onclick="location.reload()" style="font-size:14px;padding:10px 28px;border-radius:8px;cursor:pointer;background:#f38ba8;color:#1e1e2e;border:none;font-weight:600;">重新开始</button>
</div>

function isHiddenWall(floor, x, y) {
  return HIDDEN_WALLS.some(([f, hx, hy]) => f === floor && hx === x && hy === y);
}

// ============================================================
// BUILD SCENE FOR CURRENT FLOOR
// ============================================================

function buildFloor() {
  // Clear dynamic objects
  while (dynGroup.children.length > 0) {
    dynGroup.remove(dynGroup.children[0]);
  }
  doorMeshes = {};
  monsterMeshes = {};
  itemMeshes = {};
  stairMesh = null;
  wallMeshes = {};

  const map = MAPS[state.floor];
  const floor = state.floor;

  // Low pillars — wider footprint, visible at current camera height
  const wallGeo = new THREE.BoxGeometry(0.38, 0.75, 0.38);
  const doorGeo = new THREE.BoxGeometry(0.85, 0.35, 0.12);
  const half = 0.5;

  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const tile = map[y][x];
      const pos = gridToWorld(x, y);
      pos.y = 0.5;

      if (tile === TILE.WALL) {
        // Check if it's a hidden wall
        if (isHiddenWall(floor, x, y)) {
          const hwMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.9, metalness: 0.05, transparent:true, opacity: 0.55 });
          const mesh = new THREE.Mesh(wallGeo, hwMat);
          mesh.position.set(pos.x, 0.38, pos.z);
          mesh.castShadow = true;
          dynGroup.add(mesh);
          wallMeshes[key(x,y)] = mesh;
        } else {
          const mesh = new THREE.Mesh(wallGeo, matWall);
          mesh.position.set(pos.x, 0.38, pos.z);
          mesh.castShadow = true;
          // Top cap
          const capGeo = new THREE.BoxGeometry(0.42, 0.06, 0.42);
          const cap = new THREE.Mesh(capGeo, matWall);
          cap.position.y = 0.41;
          mesh.add(cap);
          dynGroup.add(mesh);
          wallMeshes[key(x,y)] = mesh;
        }
      } else if (tile === TILE.YELLOW_DOOR) {
        const mesh = new THREE.Mesh(doorGeo, matYellowDoor);
        mesh.position.set(pos.x, 0.18, pos.z);
        mesh.castShadow = true;
        dynGroup.add(mesh);
        doorMeshes[key(x,y)] = { mesh, type: 'yellow' };
      } else if (tile === TILE.BLUE_DOOR) {
        const mesh = new THREE.Mesh(doorGeo, matBlueDoor);
        mesh.position.set(pos.x, 0.18, pos.z);
        mesh.castShadow = true;
        dynGroup.add(mesh);
        doorMeshes[key(x,y)] = { mesh, type: 'blue' };
      } else if (tile === TILE.RED_DOOR) {
        const mesh = new THREE.Mesh(doorGeo, matRedDoor);
        mesh.position.set(pos.x, 0.18, pos.z);
        mesh.castShadow = true;
        dynGroup.add(mesh);
        doorMeshes[key(x,y)] = { mesh, type: 'red' };
      } else if (tile === TILE.STAIR_UP) {
        // Ladder: two poles + rungs
        const ladderGroup = new THREE.Group();
        const poleMat = new THREE.MeshStandardMaterial({ color:0x8B6914, roughness:0.5, metalness:0.3 });
        const rungMat = new THREE.MeshStandardMaterial({ color:0xc49a30, roughness:0.4, metalness:0.5, emissive:0x331100, emissiveIntensity:0.6 });
        // Side poles
        for (let sx = -1; sx <= 1; sx += 2) {
          const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.7, 6), poleMat);
          pole.position.set(sx * 0.2, 0.35, 0);
          pole.castShadow = true;
          ladderGroup.add(pole);
        }
        // Cross rungs
        for (let i = 0; i < 5; i++) {
          const rung = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.38, 6), rungMat);
          rung.rotation.z = Math.PI/2;
          rung.position.set(0, 0.1 + i * 0.14, 0);
          rung.castShadow = true;
          ladderGroup.add(rung);
        }
        // Glow base
        const glowGeo = new THREE.RingGeometry(0.25, 0.4, 32);
        const glowMat = new THREE.MeshBasicMaterial({ color:0xf5c842, side:THREE.DoubleSide, transparent:true, opacity:0.35 });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        glow.rotation.x = -Math.PI/2;
        glow.position.y = 0.03;
        ladderGroup.add(glow);
        ladderGroup.position.set(pos.x, 0, pos.z);
        dynGroup.add(ladderGroup);
        stairMesh = ladderGroup;
        stairMesh.glow = glow;
      }

      // Floor tile decoration
      if (tile !== TILE.WALL) {
        const tileGeo = new THREE.PlaneGeometry(0.9, 0.9);
        const tileMat = new THREE.MeshStandardMaterial({
          color: tile === TILE.STAIR_UP ? 0x3a3a30 : 0x2a2a38,
          roughness: 0.8, metalness: 0.05
        });
        const tileMesh = new THREE.Mesh(tileGeo, tileMat);
        tileMesh.rotation.x = -Math.PI/2;
        tileMesh.position.set(pos.x, 0.01, pos.z);
        tileMesh.receiveShadow = true;
        dynGroup.add(tileMesh);
      }
    }
  }

  // Spawn monsters
  const mDefs = MONSTERS[floor] || [];
  currentMonsters = [];
  for (const [type, mx, my] of mDefs) {
    if (defeatedThisFloor.has(key(mx, my))) continue;
    const mData = MONSTER_DB[type];
    const mesh = createMonsterMesh(mData, mx, my);
    dynGroup.add(mesh);
    monsterMeshes[key(mx, my)] = { mesh, type, data: mData };
    currentMonsters.push({ type, x: mx, y: my, data: mData });
  }

  // Spawn items
  const iDefs = ITEMS[floor] || [];
  currentItems = [];
  for (const [itype, ix, iy] of iDefs) {
    const mesh = createItemMesh(itype, ix, iy);
    dynGroup.add(mesh);
    itemMeshes[key(ix, iy)] = { mesh, type: itype };
    currentItems.push({ type: itype, x: ix, y: iy });
  }

  // Create player
  createPlayerMesh();

  // Compass direction markers on floor edges
  addCompassMarkers();

  updateHUD();
  updateMinimap();
}

function createMonsterMesh(mData, mx, my) {
  const group = new THREE.Group();

  const name = mData.name;

  const darkMat = new THREE.MeshStandardMaterial({ color:c, roughness:0.5, metalness:0.1 });

  if (name.includes('史莱姆')) {
    // Squished sphere — gooey blob
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 12), mat);
    body.scale.set(1, 0.55, 1);
    body.position.y = 0.2;
    body.castShadow = true;
    group.add(body);

      const ew = new THREE.Mesh(eyeG, eyeW);
      ew.position.set(sx*0.1, 0.3, -0.22);
      group.add(ew);
      const eb = new THREE.Mesh(new THREE.SphereGeometry(0.035, 4, 4), eyeB);
      eb.position.set(sx*0.1, 0.3, -0.27);
      group.add(eb);
    }

  } else if (name.includes('蝙蝠')) {
    // Dark body with triangular wings
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), darkMat);
    body.position.y = 0.35;
    body.castShadow = true;
    group.add(body);
    // Wings
    const wingGeo = new THREE.ConeGeometry(0.28, 0.12, 6);
    for (let sx = -1; sx <= 1; sx += 2) {
      const wing = new THREE.Mesh(wingGeo, new THREE.MeshStandardMaterial({ color:0x444466, roughness:0.6, side:THREE.DoubleSide }));
      wing.position.set(sx*0.25, 0.38, -0.05);
      wing.rotation.z = -sx * Math.PI/4;

      group.add(wing);
    }
    // Red eyes
    const reye = new THREE.Mesh(new THREE.SphereGeometry(0.04, 4, 4), new THREE.MeshBasicMaterial({ color:0xff0000 }));
    reye.position.set(-0.06, 0.42, -0.15);
    group.add(reye);

    reye2.position.x = 0.06;
    group.add(reye2);

    const skull = new THREE.Mesh(new THREE.SphereGeometry(0.14, 8, 6), boneMat);
    skull.position.y = 0.5;

    // Spine + ribs

    // Arms

      arm.position.set(sx*0.15, 0.38, 0);
      arm.rotation.z = sx * 0.6;
      group.add(arm);
    }
    // Legs

      const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.2, 6), boneMat);
      leg.position.set(sx*0.08, 0.12, 0);
      group.add(leg);

    const swordB = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.35, 0.03), new THREE.MeshStandardMaterial({ color:0xcccccc, roughness:0.3, metalness:0.8 }));
    swordB.position.set(0.2, 0.4, 0);
    swordB.rotation.z = -0.3;

  } else if (name.includes('骷髅法师')) {

    const hat = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.2, 8), mat);
    hat.position.y = 0.48;
    group.add(hat);
    // Staff
    const staffPole = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.55, 6), new THREE.MeshStandardMaterial({ color:0x8B6914, roughness:0.4, metalness:0.3 }));
    staffPole.position.set(0.2, 0.3, 0);
    group.add(staffPole);
    // Staff orb
    const orb = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 6), new THREE.MeshStandardMaterial({ color:0x8844ff, roughness:0.2, metalness:0.5, emissive:0x4422aa, emissiveIntensity:1.5 }));
    orb.position.set(0.2, 0.6, 0);
    group.add(orb);

  } else if (name.includes('守卫')) {
    // Armored warrior
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.35, 0.2), mat);

    group.add(body);

    const body = new THREE.Mesh(new THREE.DodecahedronGeometry(0.35, 0), new THREE.MeshStandardMaterial({ color:c, roughness:0.7, metalness:0.1, emissive:c, emissiveIntensity:0.4 }));

    const bigEye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), new THREE.MeshBasicMaterial({ color:0xff4400 }));

    body.position.y = 0.35;

  group.userData = {
    floatOffset: Math.random() * Math.PI * 2,

  if (itype === ITEM.RED_GEM || itype === ITEM.BLUE_GEM) {
    // Octahedron gem with glow
    const gem = new THREE.Mesh(new THREE.OctahedronGeometry(0.2, 0), itype === ITEM.RED_GEM ? matRedGem : matBlueGem);
    gem.position.y = 0.25;
    gem.castShadow = true;
    group.add(gem);
    // Inner sparkle
    const spark = new THREE.Mesh(new THREE.OctahedronGeometry(0.08, 0), new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.4 }));
    spark.position.y = 0.25;
    group.add(spark);

  } else if (itype === ITEM.RED_POTION || itype === ITEM.BLUE_POTION) {
    const pmat = itype === ITEM.RED_POTION ? matRedPotion : matBluePotion;
    // Bottle body
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 0.28, 8), pmat);
    body.position.y = 0.18;
    body.castShadow = true;
    group.add(body);
    // Bottle neck
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.08, 0.12, 8), pmat);
    neck.position.y = 0.36;
    group.add(neck);
    // Cork
    const cork = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.05, 8), new THREE.MeshStandardMaterial({ color:0x8B6914, roughness:0.7 }));
    cork.position.y = 0.44;
    group.add(cork);
    // Bubbles for blue potion
    if (itype === ITEM.BLUE_POTION) {
      const bub = new THREE.Mesh(new THREE.SphereGeometry(0.03, 4, 4), new THREE.MeshBasicMaterial({ color:0xaaccff, transparent:true, opacity:0.6 }));
      bub.position.y = 0.22;

  } else {

    let keyMat;

    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.03, 8, 8), keyMat);
    ring.position.y = 0.32;
    group.add(ring);

    const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.25, 6), keyMat);
    shaft.position.y = 0.14;
    group.add(shaft);
    // Teeth
    const tooth1 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.03, 0.04), keyMat);
    tooth1.position.set(0, 0.02, 0);
    group.add(tooth1);
    const tooth2 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.03, 0.04), keyMat);

    group.add(tooth2);
  }

  group.position.set(pos.x, 0, pos.z);
  group.userData = {

  // Body
  const bodyGeo = new THREE.BoxGeometry(0.35, 0.7, 0.25);
  const body = new THREE.Mesh(bodyGeo, matPlayer);
  body.position.y = 0.45;
  body.castShadow = true;
  group.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.18, 8, 8);
  const head = new THREE.Mesh(headGeo, matPlayer);
  head.position.y = 0.88;
  head.castShadow = true;
  group.add(head);

  // Direction indicator (small triangle)
  const triShape = new THREE.Shape();
  triShape.moveTo(0, 0.2);
  triShape.lineTo(-0.1, -0.1);
  triShape.lineTo(0.1, -0.1);
  triShape.closePath();
  const triGeo = new THREE.ExtrudeGeometry(triShape, { depth:0.05, bevelEnabled:false });
  const triMesh = new THREE.Mesh(triGeo, new THREE.MeshStandardMaterial({ color:0xff4444, emissive:0x440000, emissiveIntensity:1, roughness:0.2 }));
  triMesh.position.set(0, 0.3, -0.2);
  triMesh.name = 'indicator';
  group.add(triMesh);

  // Sword
  const swordGeo = new THREE.BoxGeometry(0.05, 0.5, 0.05);
  const sword = new THREE.Mesh(swordGeo, new THREE.MeshStandardMaterial({ color:0xcccccc, roughness:0.2, metalness:0.9 }));
  sword.position.set(0.25, 0.5, 0);
  sword.name = 'sword';
  group.add(sword);

  group.position.set(pos.x, 0, pos.z);
  playerMesh = group;
  dynGroup.add(group);
}

function addCompassMarkers() {
  // N/E/S/W markers on floor edges
  const dirs = [
    { label:'N', x:SIZE/2, z:0.3, rot:0 },
    { label:'S', x:SIZE/2, z:SIZE-0.3, rot:Math.PI },
    { label:'E', x:SIZE-0.3, z:SIZE/2, rot:-Math.PI/2 },
    { label:'W', x:0.3, z:SIZE/2, rot:Math.PI/2 },
  ];
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#888888';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  dirs.forEach(({label, x, z, rot}) => {
    ctx.clearRect(0, 0, 64, 64);
    ctx.fillText(label, 32, 32);
    const tex = new THREE.CanvasTexture(canvas);
    tex.minFilter = THREE.LinearFilter;
    const spriteMat = new THREE.SpriteMaterial({ map:tex, transparent:true, opacity:0.5 });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(x, 0.06, z);
    sprite.scale.set(0.7, 0.7, 1);
    sprite.rotation.z = rot;
    dynGroup.add(sprite);
  });
}

// ============================================================
// BATTLE SYSTEM
// ============================================================

function calcBattle(monsterType) {
  const m = MONSTER_DB[monsterType];
  const pDmg = Math.max(state.atk - m.def, 0);
  const mDmg = Math.max(m.atk - state.def, 0);
  if (pDmg <= 0) return { canWin: false, rounds: Infinity, loss: Infinity, mDmg:0, pDmg:0 };
  const rounds = Math.ceil(m.hp / pDmg);
  const loss = rounds * mDmg;
  return {
    canWin: loss < state.hp,
    rounds,
    loss,
    pDmg,
    mDmg,
    monster: m,
  };
}

function showBattlePreview(mx, my) {
  const info = monsterMeshes[key(mx, my)];
  if (!info) return;
  const result = calcBattle(info.type);

  const overlay = document.getElementById('battle-overlay');
  document.getElementById('battle-monster-name').textContent = info.data.name;
  document.getElementById('battle-calc').textContent =
    `你的伤害: ${result.pDmg}/回合 · 怪物伤害: ${result.mDmg}/回合 · 共 ${result.rounds} 回合`;

  if (!result.canWin && result.pDmg <= 0) {
    document.getElementById('battle-loss').textContent = '⚠️ 无法破防！';
    document.getElementById('battle-remain').textContent = '你的攻击力不足以伤害这个怪物';
    document.getElementById('btn-fight').style.display = 'none';
  } else if (!result.canWin) {
    document.getElementById('battle-loss').textContent = `你将损失 ${result.loss} HP`;
    document.getElementById('battle-remain').textContent = `⚠️ 生命不足！剩余 HP: ${state.hp}`;
    document.getElementById('btn-fight').style.display = 'none';
  } else {
    document.getElementById('battle-loss').textContent = `你将损失 ${result.loss} HP`;
    document.getElementById('battle-remain').textContent = `战斗后剩余: ${state.hp - result.loss} HP`;
    document.getElementById('btn-fight').style.display = '';
  }

  overlay.classList.add('active');
  overlay._battleTarget = { x: mx, y: my };
}

function doBattle(mx, my) {
  const info = monsterMeshes[key(mx, my)];
  if (!info) return;
  const result = calcBattle(info.type);
  if (!result.canWin) return;

  // Apply damage
  state.hp -= result.loss;
  state.gold += result.monster.gold;

  // Remove monster
  defeatedThisFloor.add(key(mx, my));
  const mesh = info.mesh;
  // Death animation: shrink and fade
  const shrink = { scale: 1 };
  const animId = setInterval(() => {
    shrink.scale -= 0.08;
    mesh.scale.setScalar(Math.max(shrink.scale, 0));
    if (shrink.scale <= 0) {
      clearInterval(animId);
      dynGroup.remove(mesh);
      delete monsterMeshes[key(mx, my)];
    }
  }, 30);

  updateHUD();
  updateMinimap();
  showMessage(`击败了 ${info.data.name}！失去 ${result.loss} HP，获得 ${result.monster.gold} 金币`, false);

  // Check death
  if (state.hp <= 0) {
    state.hp = 0;
    updateHUD();
    setTimeout(() => alert('💀 你倒下了...刷新页面重新开始。'), 500);
  }
}

let isMoving = false;

function canWalk(x, y) {
  const map = MAPS[state.floor];
  if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return false;
  const tile = map[y][x];

  // Check for walls (including hidden walls)
  if (tile === TILE.WALL && !isHiddenWall(state.floor, x, y)) return false;
  // Hidden walls ARE walkable
  if (tile === TILE.WALL && isHiddenWall(state.floor, x, y)) return true;

  // Check doors
  if (tile === TILE.YELLOW_DOOR && state.yellowKeys > 0) return 'yellow_door';
  if (tile === TILE.BLUE_DOOR && state.blueKeys > 0) return 'blue_door';
  if (tile === TILE.RED_DOOR && state.redKeys > 0) return 'red_door';
  if (tile === TILE.YELLOW_DOOR || tile === TILE.BLUE_DOOR || tile === TILE.RED_DOOR) return 'locked';

  // Check monsters
  if (monsterMeshes[key(x, y)]) return 'monster';

  if (tile === TILE.WALL) return false;
  return true;
}

function moveTo(nx, ny) {
  if (isMoving) return;
  const walkResult = canWalk(nx, ny);

  if (walkResult === false) return;

  if (walkResult === 'locked') {
    showMessage('🔒 没有对应的钥匙！', true);
    return;
  }

  if (walkResult === 'monster') {
    showBattlePreview(nx, ny);
    return;
  }

  // Handle door opening
  if (walkResult === 'yellow_door') {
    state.yellowKeys--;
    MAPS[state.floor][ny][nx] = TILE.FLOOR;
    removeDoor(nx, ny);
  } else if (walkResult === 'blue_door') {
    state.blueKeys--;
    MAPS[state.floor][ny][nx] = TILE.FLOOR;
    removeDoor(nx, ny);
  } else if (walkResult === 'red_door') {
    state.redKeys--;
    MAPS[state.floor][ny][nx] = TILE.FLOOR;
    removeDoor(nx, ny);
  }

  // Move player
  state.px = nx;
  state.py = ny;
  animateMove(nx, ny);

  // Pickup items
  pickupItems(nx, ny);

  // Check stairs
  checkStairs(nx, ny);

  // Check hidden wall discovery
  if (isHiddenWall(state.floor, nx, ny)) {
    showMessage('🔍 发现了隐藏通道！', false);
  }
}

function removeDoor(x, y) {
  const dk = key(x, y);
  if (doorMeshes[dk]) {
    dynGroup.remove(doorMeshes[dk].mesh);
    delete doorMeshes[dk];
  }
  showMessage('🔑 门已打开', false);
}

function pickupItems(x, y) {
  const ik = key(x, y);
  if (!itemMeshes[ik]) return;

  const info = itemMeshes[ik];
  const itype = info.type;
  let msg = '';

  switch (itype) {
    case ITEM.RED_GEM:   state.atk += 3; msg = '获得红宝石！攻击力 +3'; inventory.push({icon:'💎',name:'红宝石+3ATK'}); break;
    case ITEM.BLUE_GEM:  state.def += 3; msg = '获得蓝宝石！防御力 +3'; inventory.push({icon:'💠',name:'蓝宝石+3DEF'}); break;
    case ITEM.RED_POTION:  state.hp = Math.min(state.hp + 100, state.maxHp); state.maxHp = Math.max(state.maxHp, state.hp); msg = '获得红血瓶！生命 +100'; inventory.push({icon:'🧪',name:'红血瓶+100HP'}); break;
    case ITEM.BLUE_POTION: state.hp = Math.min(state.hp + 500, state.maxHp); state.maxHp = Math.max(state.maxHp, state.hp); msg = '获得蓝血瓶！生命 +500'; inventory.push({icon:'🧪',name:'蓝血瓶+500HP'}); break;
    case ITEM.YELLOW_KEY: state.yellowKeys++; msg = '获得黄钥匙'; inventory.push({icon:'🔑',name:'黄钥匙'}); break;
    case ITEM.BLUE_KEY:   state.blueKeys++; msg = '获得蓝钥匙'; inventory.push({icon:'🔑',name:'蓝钥匙'}); break;
    case ITEM.RED_KEY:    state.redKeys++; msg = '获得红钥匙'; inventory.push({icon:'🔑',name:'红钥匙'}); break;
  }

  // Remove item from scene
  const mesh = info.mesh;
  const shrink = { scale: 1 };
  const animId = setInterval(() => {
    shrink.scale -= 0.1;
    mesh.scale.setScalar(Math.max(shrink.scale, 0));
    if (shrink.scale <= 0) {
      clearInterval(animId);
      dynGroup.remove(mesh);
      delete itemMeshes[ik];
    }
  }, 20);

  showMessage(msg, false);
  updateHUD();
  updateMinimap();
}

function checkStairs(x, y) {
  const map = MAPS[state.floor];
  if (map[y][x] === TILE.STAIR_UP) {
    if (state.floor >= MAPS.length - 1) {
      // Victory!
      document.getElementById('victory-overlay').classList.add('active');
      return;
    }
    goToFloor(state.floor + 1);
  }
}

function goToFloor(newFloor) {
  isMoving = false; // Cancel any pending movement animation
  state.floor = newFloor;
  const start = FLOOR_START[newFloor] || [1,1];
  state.px = start[0];
  state.py = start[1];
  defeatedThisFloor = new Set();

  // Transition animation
  const trans = document.getElementById('floor-transition');
  trans.textContent = `⬆ 进入第 ${newFloor + 1} 层`;
  trans.style.display = 'flex';
  setTimeout(() => { trans.style.display = 'none'; }, 800);

  buildFloor();
  showMessage(`进入第 ${newFloor + 1} 层`, false);
}

function animateMove(nx, ny) {
  isMoving = true;
  const target = gridToWorld(nx, ny);
  const startPos = playerMesh.position.clone();
  const startTime = performance.now();
  const duration = 120;

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    // Ease out
    const ease = 1 - Math.pow(1 - t, 3);
    playerMesh.position.lerpVectors(startPos, target, ease);
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      playerMesh.position.copy(target);
      isMoving = false;
      updatePlayerLight();
      updateMinimap();
    }
  }
  requestAnimationFrame(animate);

  // Bounce effect
  const bounceStart = performance.now();
  function bounce(now) {
    const elapsed = now - bounceStart;
    if (elapsed > duration) return;
    const t = elapsed / duration;
    const yOffset = Math.sin(t * Math.PI) * 0.3;
    playerMesh.children.forEach(c => {
      if (c.isMesh && c.position.y !== undefined) {
        // Don't modify individual children's world position, modify group's y
      }
    });
    playerMesh.position.y = yOffset;
    if (elapsed < duration) requestAnimationFrame(bounce);
    else playerMesh.position.y = 0;
  }
  requestAnimationFrame(bounce);
}

function updatePlayerLight() {
  const pos = playerMesh.position;
  playerLight.position.set(pos.x, 2, pos.z);
}

// ============================================================
// UI
// ============================================================

function updateHUD() {
  document.getElementById('floor-label').textContent = `第 ${state.floor + 1} 层`;
  document.getElementById('hp-val').textContent = state.hp;
  document.getElementById('atk-val').textContent = state.atk;
  document.getElementById('def-val').textContent = state.def;
  document.getElementById('gold-val').textContent = state.gold;
  document.getElementById('yk-val').textContent = state.yellowKeys;
  document.getElementById('bk-val').textContent = state.blueKeys;
  document.getElementById('rk-val').textContent = state.redKeys;

  // Inventory icons
  const invGrid = document.getElementById('inventory-grid');
  invGrid.innerHTML = inventory.slice(-12).map(i => `<span class="inv-item" title="${i.name}">${i.icon}</span>`).join('');

  // History log
  const histList = document.getElementById('history-list');
  histList.innerHTML = history.slice(-MAX_HISTORY).map(h =>
    `<div class="history-entry">${h}</div>`
  ).join('');
}

function updateMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  const ctx = canvas.getContext('2d');
  const cs = 12; // cell size
  ctx.clearRect(0, 0, 132, 132);

  const map = MAPS[state.floor];
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const tile = map[y][x];
      if (tile === TILE.WALL) {
        if (isHiddenWall(state.floor, x, y)) {
          ctx.fillStyle = '#2a2a3a';
        } else {
          ctx.fillStyle = '#1a1a2a';
        }
      } else if (tile === TILE.FLOOR || tile === TILE.STAIR_UP) {
        ctx.fillStyle = '#2a2a38';
      } else if (tile === TILE.YELLOW_DOOR) ctx.fillStyle = '#f5c842';
      else if (tile === TILE.BLUE_DOOR) ctx.fillStyle = '#89b4fa';
      else if (tile === TILE.RED_DOOR) ctx.fillStyle = '#f38ba8';
      else ctx.fillStyle = '#333';
      ctx.fillRect(x * cs, y * cs, cs, cs);

      if (tile === TILE.STAIR_UP) {
        ctx.fillStyle = '#f5c842';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('▲', x * cs + cs/2, y * cs + cs - 1);
      }
    }
  }

  // Draw monsters
  for (const [mx, my, info] of Object.entries(monsterMeshes).map(([k,v]) => {
    const [x,y] = k.split(',').map(Number);
    return [x,y,v];
  })) {
    ctx.fillStyle = '#' + info.data.color.toString(16).padStart(6,'0');
    ctx.beginPath();
    ctx.arc(mx * cs + cs/2, my * cs + cs/2, 4, 0, Math.PI*2);
    ctx.fill();
  }

  // Draw items
  for (const ik of Object.keys(itemMeshes)) {
    const [x,y] = ik.split(',').map(Number);
    const itype = itemMeshes[ik].type;
    if (itype === ITEM.RED_GEM) ctx.fillStyle = '#ff3333';
    else if (itype === ITEM.BLUE_GEM) ctx.fillStyle = '#3388ff';
    else if (itype === ITEM.RED_POTION || itype === ITEM.BLUE_POTION) ctx.fillStyle = '#cc2222';
    else ctx.fillStyle = '#dddd44';
    ctx.fillRect(x * cs + 4, y * cs + 4, 4, 4);
  }

  // Draw player
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(state.px * cs + cs/2, state.py * cs + cs/2, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
}

function showMessage(text, isWarn) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = isWarn ? 'show warn' : 'show';
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => { el.className = ''; }, 2000);
  // Add to history
  const prefix = isWarn ? '⚠️ ' : '';
  history.push(prefix + text);
  if (history.length > MAX_HISTORY * 2) history.splice(0, history.length - MAX_HISTORY * 2);
  updateHUD();
}

// ============================================================
// INPUT
// ============================================================

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  handleInput();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function handleInput() {
  if (isMoving) return;
  if (document.getElementById('battle-overlay').classList.contains('active')) return;
  if (document.getElementById('victory-overlay').classList.contains('active')) return;

  let dx = 0, dy = 0;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
  else if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;
  else if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
  else if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
  else if (keys['r'] || keys['R']) { resetCamera(); keys['r'] = false; keys['R'] = false; return; }

  if (dx === 0 && dy === 0) return;

  // Clear key immediately to prevent repeated moves
  keys['ArrowUp'] = keys['w'] = keys['W'] = false;
  keys['ArrowDown'] = keys['s'] = keys['S'] = false;
  keys['ArrowLeft'] = keys['a'] = keys['A'] = false;
  keys['ArrowRight'] = keys['d'] = keys['D'] = false;

  moveTo(state.px + dx, state.py + dy);
}

// Battle panel buttons
document.getElementById('btn-fight').addEventListener('click', () => {
  const overlay = document.getElementById('battle-overlay');
  const target = overlay._battleTarget;
  if (target) {
    doBattle(target.x, target.y);
  }
  overlay.classList.remove('active');
  overlay._battleTarget = null;
});

document.getElementById('btn-retreat').addEventListener('click', () => {
  const overlay = document.getElementById('battle-overlay');
  overlay.classList.remove('active');
  overlay._battleTarget = null;
});

// Keyboard control for battle panel
window.addEventListener('keydown', (e) => {
  const overlay = document.getElementById('battle-overlay');
  if (overlay.classList.contains('active')) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      document.getElementById('btn-fight').click();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      document.getElementById('btn-retreat').click();
    }
  }
});

// Click to move (raycasting)
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener('click', (e) => {
  const overlay = document.getElementById('battle-overlay');
  if (overlay.classList.contains('active')) return;
  if (isMoving) return;
  if (e.target.tagName === 'BUTTON' || e.target.closest('#hud') || e.target.closest('#minimap')) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObjects(dynGroup.children, true);
  if (intersects.length > 0) {
    const point = intersects[0].point;
    const gx = Math.floor(point.x);
    const gy = Math.floor(point.z);
    if (gx >= 0 && gx < SIZE && gy >= 0 && gy < SIZE) {
      // Simple path: just try to move directly if adjacent
      if (Math.abs(gx - state.px) + Math.abs(gy - state.py) === 1) {
        moveTo(gx, gy);
      }
    }
  }
});

// Camera controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(SIZE/2, 0, SIZE/2);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.minDistance = 5;
controls.maxDistance = 25;
controls.maxPolarAngle = Math.PI/2 - 0.1;
controls.minPolarAngle = 0.3;
controls.mouseButtons = {
  LEFT: THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.PAN,
  RIGHT: THREE.MOUSE.PAN,
};
controls.update();

// Track drag state for camera snap
controls._isDragging = false;
renderer.domElement.addEventListener('pointerdown', () => { controls._isDragging = true; });
renderer.domElement.addEventListener('pointerup', () => { setTimeout(() => { controls._isDragging = false; }, 150); });

function resetCamera() {
  controls.target.set(SIZE/2, 0, SIZE/2);
  camera.position.set(8, 9, 14);
  camera.lookAt(SIZE/2, 0, SIZE/2);
  controls.update();
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// GAME LOOP
// ============================================================

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const time = performance.now() * 0.001;

  controls.update();

  // Camera snap: auto-align to nearest 90° when not rotating
  const isDragging = controls._isDragging || false;
  if (!isDragging) {
    const azimuth = controls.getAzimuthalAngle();
    const target = Math.round(azimuth / (Math.PI/2)) * (Math.PI/2);
    if (Math.abs(azimuth - target) > 0.005) {
      const newAzimuth = azimuth + (target - azimuth) * 0.12;
      // Reconstruct spherical coords
      const spherical = new THREE.Spherical();
      spherical.setFromVector3(camera.position.clone().sub(controls.target));
      spherical.theta = newAzimuth;
      const newPos = new THREE.Vector3().setFromSpherical(spherical).add(controls.target);
      camera.position.copy(newPos);
      camera.lookAt(controls.target);
    }
  }

  // Float items (groups, float the whole group)
  for (const entry of Object.values(itemMeshes)) {
    const ud = entry.mesh.userData;
    entry.mesh.position.y = Math.sin(time * 2.5 + ud.floatOffset) * 0.1;
    entry.mesh.rotation.y += dt * 1.2;
  }

  // Float monsters slightly
  for (const info of Object.values(monsterMeshes)) {
    const ud = info.mesh.userData;
    info.mesh.position.y = Math.sin(time * 2 + ud.floatOffset) * 0.06;
  }

  // Stair glow pulse (ladder)
  if (stairMesh && stairMesh.glow) {
    stairMesh.glow.material.opacity = 0.25 + Math.sin(time * 3) * 0.15;
  }

  updatePlayerLight();
  renderer.render(scene, camera);
}

// ============================================================
// INIT
// ============================================================

buildFloor();
updatePlayerLight();
animate();

// Block repeated keypress
setInterval(() => {
  if (Object.values(keys).some(v => v)) handleInput();
}, 150);

console.log('🏰 3D魔塔已就绪 | 方向键/WASD移动 | 鼠标拖拽旋转 | 滚轮缩放');
console.log(`当前: 第${state.floor+1}层 | HP:${state.hp} ATK:${state.atk} DEF:${state.def}`);
</script>
